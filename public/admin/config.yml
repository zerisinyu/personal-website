# Sveltia CMS configuration.
# Login requires a GitHub OAuth app + a small OAuth relay (e.g. a Cloudflare
# Worker). See "Editing in the browser" in the README, then fill in base_url.
backend:
  name: github
  repo: zerisinyu/personal-website
  branch: main
  base_url: https://sveltia-cms-auth.zerisinyu.workers.dev

# Fallback media location (collections below keep media next to content).
media_folder: public/uploads
public_folder: /personal-website/uploads

collections:
  - name: pages
    label: Pages
    files:
      - name: about
        label: About
        file: src/content/pages/about.md
        # Uploaded photo lands next to the file and is referenced relatively.
        media_folder: ''
        public_folder: ''
        fields:
          - { name: title, label: Title, widget: string, default: About }
          - { name: photo, label: Photo, widget: image, required: false }
          - { name: linkedin, label: LinkedIn URL, widget: string, required: false }
          - { name: github, label: GitHub URL, widget: string, required: false }
          - { name: email, label: Email, widget: string, required: false }
          - { name: body, label: Body, widget: markdown }

  - name: blog
    label: Blog
    folder: src/content/blog
    create: true
    extension: md
    format: yaml-frontmatter
    slug: '{{slug}}'
    # Images uploaded while writing a post land next to the post file and are
    # referenced with relative paths, matching the local workflow.
    media_folder: ''
    public_folder: ''
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, format: 'YYYY-MM-DD' }
      - { name: summary, label: Summary, widget: string, required: false }
      - { name: tags, label: Tags, widget: list, default: [], required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }

  - name: projects
    label: Projects
    folder: src/content/projects
    create: true
    extension: md
    format: yaml-frontmatter
    # One folder per project: the entry file is <slug>/index.md and uploaded
    # images live in the same folder.
    path: '{{slug}}/index'
    media_folder: ''
    public_folder: ''
    fields:
      - { name: title, label: Title, widget: string }
      - { name: summary, label: Summary, widget: string, hint: 'One line for cards and meta description' }
      - { name: year, label: Year, widget: number, value_type: int }
      - { name: tags, label: Tags, widget: list, default: [], required: false }
      - { name: cover, label: Cover image, widget: image, required: false }
      - name: type
        label: Type
        widget: select
        hint: 'Choose External for any link to another website — including your own project hosted elsewhere on GitHub Pages, Observable, etc.'
        options:
          - { label: 'Case study — write the story below, page is built automatically', value: case-study }
          - { label: 'Custom — a page you hand-built inside this site', value: custom }
          - { label: 'External — links out to another website', value: external }
        default: case-study
      - name: href
        label: Link (only for Custom or External)
        widget: string
        required: false
        hint: 'External: paste the full URL (https://…). Custom: an internal path like /work/my-page.'
      - { name: featured, label: Featured, widget: boolean, default: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: tools, label: Tools, widget: list, default: [], required: false, hint: 'Shown on the case-study page, e.g. Python, pandas, D3' }
      - name: links
        label: Links
        widget: list
        required: false
        hint: 'Outbound links shown on the case-study page (GitHub repo, live demo, report…)'
        fields:
          - { name: label, label: Label, widget: string }
          - { name: url, label: URL, widget: string }
      - { name: order, label: Order, widget: number, required: false, value_type: int }
      - { name: body, label: Body, widget: markdown }
